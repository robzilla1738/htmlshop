<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>welcome to htmlshop</title>
  <style>
    body {
      margin: 0;
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      background: #101116;
      color: #f4f5f8;
      font-family: "DM Sans", Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .eyebrow {
      position: absolute;
      left: 108px;
      top: 112px;
      width: 864px;
      margin: 0;
      color: #8d95a6;
      font-size: 24px;
      line-height: 1;
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }
    .title {
      position: absolute;
      left: 104px;
      top: 246px;
      width: 872px;
      margin: 0;
      font-size: 118px;
      line-height: 0.92;
      letter-spacing: -0.04em;
      font-weight: 800;
    }
    .subtitle {
      position: absolute;
      left: 112px;
      top: 548px;
      width: 760px;
      margin: 0;
      color: #c5cad5;
      font-size: 40px;
      line-height: 1.18;
      font-weight: 500;
    }
    .card {
      position: absolute;
      left: 112px;
      top: 776px;
      width: 856px;
      height: 156px;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(79,140,255,0.22), rgba(46,204,113,0.12));
    }
    .tip {
      position: absolute;
      left: 150px;
      top: 822px;
      width: 780px;
      margin: 0;
      color: #eef2ff;
      font-size: 31px;
      line-height: 1.25;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <p class="eyebrow">Getting started</p>
  <h1 class="title">Welcome to htmlshop</h1>
  <p class="subtitle">Click any text or shape, tweak it in the panels, then export a crisp PNG or JPG.</p>
  <div class="card"></div>
  <p class="tip">Try dragging this card, renaming the artboard, or adding a second slide.</p>
</body>
</html>
