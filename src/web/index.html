<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>htmlshop</title>
  <link rel="icon" type="image/jpeg" href="/favicon.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="gallery-body">
  <header class="top">
    <a href="/" class="logo"><h1>htmlshop</h1></a>
    <span id="count" class="muted"></span>
    <span id="root-path" class="root-path muted"></span>
    <div class="toolbar">
      <button id="new-folder" class="tb tb-wide" type="button">+ New carousel</button>
      <button id="new-design" class="tb tb-wide" type="button">+ New design</button>
    </div>
  </header>
  <main id="main" class="gallery-main">
    <div id="empty" class="empty-state" hidden>
      <div class="empty-title">No designs yet</div>
      <div class="empty-hint">
        Click <b>+ New design</b> to start a blank canvas, or drop <code>.html</code> files into this folder.
      </div>
    </div>
    <p id="hint" class="hint muted" hidden>Click any design to open it. Folders with multiple designs can be opened as a carousel.</p>
    <div id="groups"></div>
  </main>
  <script type="module" src="/gallery.js"></script>
</body>
</html>
